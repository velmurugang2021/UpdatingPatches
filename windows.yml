---
- name: Windows update playbook
  hosts: all
  gather_facts: yes

  tasks:

    - name: Run only on Windows hosts
      win_ping:
      when: ansible_os_family == "Windows"

    - name: Install Windows updates
      win_updates:
        category_names:
          - SecurityUpdates
          - CriticalUpdates
        state: installed
        reboot: false
      register: patch_result
      when: ansible_os_family == "Windows"

    - name: Show patch results
      debug:
        msg: >
          Host: {{ inventory_hostname }}
          Updates installed: {{ patch_result.installed_update_count | default(0) }}
          Reboot required: {{ patch_result.reboot_required | default(false) }}
      when: ansible_os_family == "Windows"

    - name: Reboot if required
      win_reboot:
        msg: "Rebooting after Windows Updates"
        pre_reboot_delay: 10
        post_reboot_delay: 30
        reboot_timeout: 600
      when:
        - ansible_os_family == "Windows"
        - patch_result.reboot_required | default(false)
